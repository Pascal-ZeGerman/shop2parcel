name: hassfest

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  hassfest:
    name: Validate manifest.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: "home-assistant/actions/hassfest@master"  # stable branch
