name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            Shop2Parcel ${{ github.ref_name }}

            A Home Assistant custom integration that polls Gmail for Shopify shipping
            confirmation emails and forwards tracking data to Parcel (parcelapp.net).

            ## Install via HACS
            See README.md for full setup instructions including Google Cloud OAuth2
            credentials and Parcel API key retrieval.

            ## What's changed
            See auto-generated notes below.
