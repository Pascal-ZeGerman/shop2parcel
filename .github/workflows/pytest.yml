name: pytest + lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Set up Python 3.14
        uses: actions/setup-python@0b93645e9fea7318ecaed2f359191a23d3e6e7c3  # v5.3.0
        with:
          python-version: "3.14"
          cache: "pip"
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short

  lint:
    name: ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Set up Python 3.14
        uses: actions/setup-python@0b93645e9fea7318ecaed2f359191a23d3e6e7c3  # v5.3.0
        with:
          python-version: "3.14"
          cache: "pip"
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]" ruff mypy
      - name: ruff check
        run: ruff check .
      - name: ruff format check
        run: ruff format --check .
      - name: mypy
        run: mypy custom_components/shop2parcel/
